<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Selection Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label for="storage" class="feature-card">
            <input type="checkbox" name="cloud-storage" id="storage">
            <div class="text">
                <h3>Cloud Storage</h3>
                <p>100 Gigabyte secure storage</p>
            </div>
        </label>
        <label for="support" class="feature-card">
            <input type="checkbox" name="dedicated-support" id="support">
            <div class="text">
                <h3>Dedicated Support</h3>
                <p>24/7 customer help</p>
            </div>
        </label>
        <label for="analytics" class="feature-card">
            <input type="checkbox" name="advanced-analytics" id="analytics">
            <div class="text">
                <h3>Advanced Analytics</h3>
                <p>Insighted & reports</p>
            </div>
        </label>
        <label for="themes" class="feature-card">
            <input type="checkbox" name="user-themes" id="themes">
            <div class="text">
                <h3>Custom User Themes</h3>
                <p>Personalized dashboard design</p>
            </div>
        </label>
        <label for="collab" class="feature-card">
            <input type="checkbox" name="collab" id="collab">
            <div class="text">
                <h3>Multi-User Collab</h3>
                <p>Team access and sharing</p>
            </div>
        </label>
        <label for="access" class="feature-card">
            <input type="checkbox" name="access" id="access">
            <div class="text">
                <h3>API Access</h3>
                <p>Integrate with your custom built tools</p>
            </div>
        </label>
    </div>
</body>
</html>
