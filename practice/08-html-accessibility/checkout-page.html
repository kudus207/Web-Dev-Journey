<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <figure>
            <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="Tea spoon">
            <figcaption>Left-handed spoon</figcaption>
            <p>$29.99</p>
        </figure>
    </section>
    <section>
        <h2>Payment Information</h2>
        <form action="">
            <label for="card-name">Cardholder Name <span aria-hidden="true">*</span></label>
            <input type="text" name="card-name" id="card-name" required><br>
            <label for="card-number">Card Number <span aria-hidden="true">*</span></label>
            <input type="text" name="card-number" id="card-number" required aria-describedby="card-number-help">
            <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>
            <label for="expiry-date">Expiry Date <span aria-hidden="true">*</span></label>
            <input type="number" name="date" id="expiry-date" placeholder="MM/YY" required><br>
            <label for="cvv">CVV <span aria-hidden="true">*</span></label>
            <input type="number" name="code" id="cvv" required><br>
            <button type="button">Place Order</button>
        </form>
    </section>
</body>

</html>
