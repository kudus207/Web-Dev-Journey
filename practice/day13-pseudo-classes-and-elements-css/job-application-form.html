<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name" class="personal-info">Full Name: </label>
            <input type="text" name="name" id="name" class="info" placeholder="Enter your name" required>
            <label for="email" class="personal-info">Email: </label>
            <input type="email" name="email" id="email" class="info" placeholder="Enter your email" required>
            <label for="position" class="personal-info">Position: </label>
            <select name="position" id="position">
                <option value="0">Select a position</option>
                <option value="1">Manager</option>
                <option value="2">Secretary</option>
                <option value="3">Receptionist</option>
            </select>
            <fieldset class="radio-group">
                <legend>Availability: </legend>
                <input type="radio" name="availability" id="full-time" class="radio-btn" value="full-time" checked>
                <label for="full-time">Full-Time</label>
                <input type="radio" name="availability" id="part-time" class="radio-btn" value="part-time">
                <label for="part-time">Part-Time</label>
            </fieldset>
            <label for="message" class="personal-info">Why do you want this job?</label>
            <textarea name="text" id="message" placeholder="Write your motivation"></textarea>
            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>
</body>

</html>
