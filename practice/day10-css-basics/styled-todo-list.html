    <div class="container">
        <h1>My To-Do List</h1>
        <ul class="todo-list">
            <li class="list-item1">
                <input type="checkbox" name="list1" id="item1">
                <label for="item1">Explore gaming keyboards</label>
                <ul class="sub-item">
                    <li class="link-list"><a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">Store link</a></li>
                </ul>
            </li>
            <li class="list-item2">
                <input type="checkbox" name="list2" id="item2">
                <label for="item2">Finish the report</label>
                <ul class="sub-item">
                    <li class="link-list"><a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">Request Access</a></li>
                </ul>
            </li>
            <li class="list-item3">
                <input type="checkbox" name="list3" id="item3">
                <label for="item3">View Phone's Warranty</label>
                <ul class="sub-item">
                    <li class="link-list"><a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">View Receipts</a></li>
                </ul>
            </li>
            <li class="list-item4">
                <input type="checkbox" name="list3" id="item3">
                <label for="item3">Check Processor Specs</label>
                <ul class="sub-item">
                    <li class="link-list"><a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">View Model Number</a></li>
                </ul>
            </li>
        </ul>
    </div>
